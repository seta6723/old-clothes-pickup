<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>헌옷수거 바로실행 테스트앱</title>
<style>
:root{--blue:#2563eb;--dark:#111827;--bg:#f4f7fb;--gray:#64748b;--line:#e5e7eb;--green:#16a34a;--orange:#f97316;--red:#ef4444}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Pretendard,'Noto Sans KR',sans-serif;color:var(--dark)}.app{max-width:520px;margin:0 auto;min-height:100vh;background:#f8fafc}.hero{padding:24px 18px 20px;background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff;border-radius:0 0 28px 28px;box-shadow:0 10px 30px #1d4ed833}.hero h1{margin:0;font-size:24px;letter-spacing:-.8px}.hero p{margin:8px 0 0;color:#dbeafe;font-size:13px}.tabs{position:sticky;top:0;z-index:10;display:flex;gap:8px;padding:12px;background:#f8fafc}.tab{flex:1;border:0;border-radius:999px;padding:12px 8px;background:#fff;color:#475569;font-weight:900;box-shadow:0 3px 12px #0f172a0d}.tab.on{background:var(--blue);color:#fff}.page{display:none;padding:0 14px 40px}.page.on{display:block}.card{background:#fff;border-radius:22px;padding:16px;margin:12px 0;box-shadow:0 8px 28px #0f172a10;border:1px solid #eef2f7}.title{font-size:18px;font-weight:950;margin:0 0 14px;letter-spacing:-.5px}.field{margin:11px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:block;font-size:13px;font-weight:900;color:#334155;margin-bottom:7px}input,select,textarea{width:100%;border:1px solid #d8dee9;border-radius:15px;padding:13px 12px;font-size:15px;background:#fff;outline:none}textarea{min-height:86px;resize:vertical}.btn{width:100%;border:0;border-radius:16px;background:var(--blue);color:#fff;padding:15px;font-size:15px;font-weight:950;margin-top:10px}.btn.dark{background:#111827}.btn.gray{background:#e5e7eb;color:#111827}.btn.red{background:var(--red)}.mini{border:0;border-radius:12px;background:#eef2ff;color:#1d4ed8;font-weight:900;padding:10px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.summary div{border:1px solid var(--line);border-radius:17px;background:#f8fafc;padding:13px 8px;text-align:center}.summary strong{display:block;font-size:22px}.summary span{font-size:12px;color:var(--gray);font-weight:900}.item{border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;background:#fff}.item h3{margin:0 0 8px;font-size:16px}.meta{font-size:13px;color:var(--gray);line-height:1.65}.badge{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:950;background:#dbeafe;color:#1d4ed8}.badge.green{background:#dcfce7;color:#15803d}.badge.orange{background:#ffedd5;color:#c2410c}.badge.gray{background:#e5e7eb;color:#374151}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.notice{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:17px;padding:13px;font-size:13px;line-height:1.55}.empty{text-align:center;color:#64748b;padding:28px 10px}.map{height:230px;border-radius:22px;background:linear-gradient(135deg,#dcfce7,#dbeafe);position:relative;overflow:hidden;border:1px solid #cbd5e1}.road{position:absolute;background:#ffffffa0;border-radius:999px}.r1{width:360px;height:16px;left:-80px;top:80px;transform:rotate(25deg)}.r2{width:340px;height:14px;right:-100px;top:150px;transform:rotate(-20deg)}.pin{position:absolute;width:34px;height:34px;border-radius:50% 50% 50% 0;background:#2563eb;transform:rotate(-45deg);box-shadow:0 8px 20px #1d4ed866}.pin:after{content:'';position:absolute;inset:9px;border-radius:50%;background:#fff}.p1{left:42px;top:52px}.p2{left:170px;top:116px;background:#f97316}.p3{right:72px;top:72px;background:#16a34a}.route{background:#0f172a;color:#fff;border-radius:18px;padding:12px;margin-top:12px}.step{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #334155}.step:last-child{border-bottom:0}.num{width:28px;height:28px;display:grid;place-items:center;border-radius:999px;background:#60a5fa;font-weight:950;flex:none}.smalltext{font-size:12px;color:#cbd5e1;line-height:1.5}.choice-wrap{display:flex;overflow-x:auto;gap:8px;flex-wrap:nowrap;padding-right:40px;scrollbar-width:none}.choice-wrap::-webkit-scrollbar{display:none}.choice{border:1px solid #cbd5e1;background:#fff;color:#334155;border-radius:999px;padding:11px 13px;font-size:14px;font-weight:900;cursor:pointer}.choice.on{background:#2563eb;color:#fff;border-color:#2563eb;box-shadow:0 6px 16px #2563eb33}.choice-note{margin-top:7px;font-size:12px;color:#64748b}@media(max-width:420px){.grid{grid-template-columns:1fr}.hero h1{font-size:22px}}
</style>

<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body><div class="app">
<header class="hero"><h1>헌옷수거 올인원 테스트앱</h1><p>고객 접수 · 관리자 배정 · 기사 동선 플래닝 데모</p></header>
<nav class="tabs"><button class="tab on" data-page="request">고객접수</button><button class="tab" data-page="admin">관리자</button><button class="tab" data-page="driver">기사동선</button></nav>
<section id="request" class="page on"><div class="card"><p class="title">수거 신청하기</p><div class="grid"><div class="field"><label>이름</label><input id="name" placeholder="홍길동"></div><div class="field"><label>연락처</label><input id="phone" placeholder="010-0000-0000"></div></div>
<div class="field">
<label>주소</label>
<div style="display:flex;gap:8px;margin-bottom:8px">
<input id="zipcode" placeholder="우편번호" readonly>
<button type="button" class="mini" onclick="execDaumPostcode()">주소검색</button>
</div>
<input id="address" placeholder="주소" readonly>
<input id="detailAddress" placeholder="상세주소 (동/호수)" style="margin-top:8px">
</div>
<div class="grid"><div class="field"><label>희망일</label><input id="date" type="date"></div><div class="field"><label>희망시간</label><select id="time"><option>오전 09:00~12:00</option><option>오후 12:00~15:00</option><option>오후 15:00~18:00</option><option>저녁 18:00~20:00</option></select></div></div><div class="field"><label>수거 품목 <span style="color:#64748b;font-weight:700">중복 선택 가능</span></label><div id="itemButtons" class="choice-wrap"><button type="button" class="choice" data-item="헌옷">헌옷</button><button type="button" class="choice" data-item="신발/가방">신발/가방</button><button type="button" class="choice" data-item="이불/커튼">이불/커튼</button><button type="button" class="choice" data-item="전자기기">전자기기</button><button type="button" class="choice" data-item="가전">가전</button><button type="button" class="choice" data-item="고철">고철</button></div><div class="choice-note">원하는 품목을 여러 개 눌러 선택하세요.</div></div><div class="field"><label>요청사항</label><textarea id="memo" placeholder="공동현관 비밀번호, 방문 전 연락 등"></textarea></div><button class="btn" onclick="addRequest()">접수하기</button></div><div class="notice">서버 없는 테스트용입니다. 접수 데이터는 지금 쓰는 브라우저에 저장됩니다.</div></section>
<section id="admin" class="page"><div class="card"><p class="title">관리자 대시보드</p><div class="summary"><div><strong id="total">0</strong><span>전체</span></div><div><strong id="wait">0</strong><span>접수</span></div><div><strong id="done">0</strong><span>완료</span></div></div></div><div class="card"><div class="row"><p class="title" style="margin:0">접수 목록</p><button class="mini" onclick="seedData()">샘플추가</button></div><div id="adminList"></div><button class="btn red" onclick="clearAll()">전체 삭제</button></div></section>
<section id="driver" class="page"><div class="card"><p class="title">오늘의 추천 동선</p><div class="map"><div class="road r1"></div><div class="road r2"></div><div class="pin p1"></div><div class="pin p2"></div><div class="pin p3"></div></div><button class="btn dark" onclick="makeRoute()">최적 동선 다시 짜기</button><div id="routeList" class="route"></div></div></section>
</div><script>

function execDaumPostcode(){
 new daum.Postcode({
   oncomplete:function(data){
     document.getElementById('zipcode').value=data.zonecode;
     document.getElementById('address').value=data.address;
     document.getElementById('detailAddress').focus();
   }
 }).open();
}

const $=id=>document.getElementById(id);let requests=JSON.parse(localStorage.getItem('pickupRequests')||'[]');let selectedItems=[];
document.querySelectorAll('.choice').forEach(btn=>btn.onclick=()=>{const item=btn.dataset.item;if(selectedItems.includes(item)){selectedItems=selectedItems.filter(x=>x!==item);btn.classList.remove('on');}else{selectedItems.push(item);btn.classList.add('on');}});
function save(){localStorage.setItem('pickupRequests',JSON.stringify(requests));render();}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));b.classList.add('on');$(b.dataset.page).classList.add('on');render();});
function addRequest(){const name=$('name').value.trim(),phone=$('phone').value.trim(),address=(($('address').value||'')+' '+($('detailAddress')?.value||'')).trim();if(!name||!phone||!address){alert('이름, 연락처, 주소는 필수입니다.');return;}requests.unshift({id:Date.now(),name,phone,address,date:$('date').value||'미정',time:$('time').value,items:selectedItems.length?selectedItems.join(' / '):'미선택',memo:$('memo').value,status:'접수완료',driver:'미배정',created:new Date().toLocaleString('ko-KR')});['name','phone','address','memo'].forEach(id=>$(id).value='');selectedItems=[];document.querySelectorAll('.choice').forEach(btn=>btn.classList.remove('on'));save();alert('접수 완료! 관리자 화면에서 확인하세요.');}
function statusClass(s){return s==='수거완료'?'green':s==='기사배정'?'orange':''}
function setStatus(id,s){requests=requests.map(r=>r.id===id?{...r,status:s}:r);save();}
function assign(id){const driver=prompt('기사명을 입력하세요','김기사');if(!driver)return;requests=requests.map(r=>r.id===id?{...r,driver,status:'기사배정'}:r);save();}
function removeReq(id){if(confirm('삭제할까요?')){requests=requests.filter(r=>r.id!==id);save();}}
function render(){const total=requests.length, wait=requests.filter(r=>r.status==='접수완료').length, done=requests.filter(r=>r.status==='수거완료').length;$('total').textContent=total;$('wait').textContent=wait;$('done').textContent=done;const list=$('adminList');if(!requests.length){list.innerHTML='<div class="empty">아직 접수된 내역이 없습니다.</div>';}else{list.innerHTML=requests.map(r=>`<div class="item"><div class="row"><h3>${r.name} 고객</h3><span class="badge ${statusClass(r.status)}">${r.status}</span></div><div class="meta">📞 ${r.phone}<br>📍 ${r.address}<br>🗓 ${r.date} / ${r.time}<br>📦 ${r.items}<br>🚚 담당: ${r.driver}<br>메모: ${r.memo||'없음'}</div><div class="actions"><button class="mini" onclick="assign(${r.id})">기사배정</button><button class="mini" onclick="setStatus(${r.id},'수거중')">수거중</button><button class="mini" onclick="setStatus(${r.id},'수거완료')">완료</button><button class="mini" onclick="removeReq(${r.id})">삭제</button></div></div>`).join('');}makeRoute(false);}
function makeRoute(showAlert=true){const targets=requests.filter(r=>r.status!=='수거완료');const sorted=[...targets].sort((a,b)=>a.address.localeCompare(b.address,'ko'));$('routeList').innerHTML=sorted.length?sorted.map((r,i)=>`<div class="step"><div class="num">${i+1}</div><div><b>${r.address}</b><div class="smalltext">${r.name} · ${r.phone} · ${r.items}<br>예상 방문: ${r.time}</div></div></div>`).join(''):'<div class="empty" style="color:#cbd5e1">방문할 접수가 없습니다.</div>';if(showAlert)alert('테스트용 최적 동선이 재정렬되었습니다. 실제 버전에서는 네이버 지도 API를 연결합니다.');}
function seedData(){const samples=[['김민지','010-1111-2222','서울 송파구 올림픽로 300'],['박서준','010-3333-4444','서울 강남구 테헤란로 152'],['이수정','010-5555-6666','서울 서초구 서초대로 77']];samples.forEach(s=>requests.unshift({id:Date.now()+Math.random(),name:s[0],phone:s[1],address:s[2],date:new Date().toISOString().slice(0,10),time:'오후 12:00~15:00',items:'헌옷 / 신발/가방 / 가전/전자기기 / 고철',memo:'방문 전 연락 주세요',status:'접수완료',driver:'미배정',created:new Date().toLocaleString('ko-KR')}));save();}
function clearAll(){if(confirm('전체 접수 내역을 삭제할까요?')){requests=[];save();}}
render();
</script></body></html>
